<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AP Top 25 – College Football</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #111;
    }

    .widget { width: 100%; }

    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .football-icon { width: 48px; height: 48px; flex-shrink: 0; }

    .header-text h1 { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: 0.01em; }
    .header-text p  { font-size: 12px; color: rgba(255,255,255,0.45); margin-top: 2px; }

    .refresh-btn {
      margin-left: auto;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.55);
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .refresh-btn:disabled { opacity: 0.4; cursor: default; }

    .body { background: #161616; }

    .col-header {
      display: grid;
      grid-template-columns: 48px 1fr 80px 80px;
      padding: 0.5rem 1.5rem;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .col-header span {
      font-size: 10px; font-weight: 600;
      color: rgba(255,255,255,0.28);
      text-transform: uppercase; letter-spacing: 0.07em;
    }
    .col-header .right { text-align: right; }

    .row {
      display: grid;
      grid-template-columns: 48px 1fr 80px 80px;
      align-items: center;
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.1s;
    }
    .row:last-child { border-bottom: none; }
    .row:hover { background: rgba(255,255,255,0.03); }

    .rank { font-size: 15px; font-weight: 700; color: rgba(255,255,255,0.35); width: 28px; }
    .rank.top3 { color: #f5a623; }

    .team-info { display: flex; flex-direction: column; gap: 1px; }
    .team-name  { font-size: 14px; font-weight: 600; color: #fff; }
    .team-conf  { font-size: 11px; color: rgba(255,255,255,0.28); }

    .record { font-size: 13px; color: rgba(255,255,255,0.45); text-align: right; }
    .pts    { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.6); text-align: right; }

    .move {
      display: inline-flex; align-items: center;
      font-size: 9px; font-weight: 700;
      padding: 1px 4px; border-radius: 3px; margin-left: 5px; vertical-align: middle;
    }
    .move-up   { background: rgba(52,199,89,0.18);  color: #34c759; }
    .move-down { background: rgba(255,59,48,0.18);  color: #ff3b30; }
    .move-new  { background: rgba(245,166,35,0.2);  color: #f5a623; }

    .loading, .error {
      padding: 2.5rem 1.5rem; text-align: center;
      color: rgba(255,255,255,0.35); font-size: 13px;
    }
    .error { color: #ff6b6b; }
    .spinner {
      width: 22px; height: 22px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: rgba(255,255,255,0.5);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      padding: 0.6rem 1.25rem;
      border-top: 1px solid rgba(255,255,255,0.05);
      font-size: 10px; color: rgba(255,255,255,0.2); text-align: center;
    }
  </style>
</head>
<body>
<div class="widget">
  <div class="header">
    <svg class="football-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="24" cy="24" rx="18" ry="11" transform="rotate(-35 24 24)" fill="#8B4513"/>
      <ellipse cx="24" cy="24" rx="18" ry="11" transform="rotate(-35 24 24)" fill="url(#fg)" opacity="0.6"/>
      <line x1="24" y1="17" x2="24" y2="31" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="21" y1="20" x2="27" y2="20" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="21" y1="23" x2="27" y2="23" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="21" y1="26" x2="27" y2="26" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
      <path d="M10 20 Q24 15 38 20" stroke="white" stroke-width="0.8" fill="none" opacity="0.5" transform="rotate(-35 24 24)"/>
      <path d="M10 28 Q24 33 38 28" stroke="white" stroke-width="0.8" fill="none" opacity="0.5" transform="rotate(-35 24 24)"/>
      <defs>
        <linearGradient id="fg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#fff" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#000" stop-opacity="0.15"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="header-text">
      <h1>AP Top 25</h1>
      <p id="subtitle">College Football Poll</p>
    </div>
    <button class="refresh-btn" id="refresh-btn" onclick="loadRankings(true)">↻ Refresh</button>
  </div>

  <div class="body">
    <div id="content">
      <div class="loading"><div class="spinner"></div>Loading latest rankings…</div>
    </div>
  </div>
</div>

<script>
const CACHE_KEY = 'ap_top25_cache';

async function fetchFromClaude() {
  const response = await fetch("https://anthropic-proxy.nancyamedeo.workers.dev/", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 2000,
      tools: [{ type: "web_search_20250305", name: "web_search" }],
      system: `You are a sports data API. Return ONLY a valid JSON object, no markdown, no explanation.
Schema: { "week": "Week N, Season YYYY", "updated": "Month DD, YYYY", "teams": [ { "rank": 1, "name": "Team Name", "conf": "Conference", "record": "W-L", "points": 1550, "prevRank": 1 }, ... ] }
Include all 25 ranked teams. prevRank: previous week rank (0 = not previously ranked). Return ONLY the JSON object.`,
      messages: [{ role: "user", content: "Search for the current AP Top 25 college football poll rankings and return the data as JSON." }]
    })
  });

  const data = await response.json();
  if (!response.ok || data.error) throw new Error(JSON.stringify(data.error || data));
  if (!data.content) throw new Error("No content");

  const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
  let clean = text.replace(/```json|```/g, '').trim();
  const s = clean.indexOf('{'), e = clean.lastIndexOf('}');
  if (s === -1 || e === -1) throw new Error("No JSON in response");
  clean = clean.slice(s, e + 1);
  const parsed = JSON.parse(clean);
  if (!parsed.teams || !Array.isArray(parsed.teams)) throw new Error("Invalid data");
  return parsed;
}

function saveCache(data) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data })); } catch(e) {}
}
function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const { ts, data } = JSON.parse(raw);
    if (Date.now() - ts < 24 * 60 * 60 * 1000) return data;
  } catch(e) {}
  return null;
}

function render(data) {
  document.getElementById('subtitle').textContent =
    `${data.week || 'Latest Poll'} · Updated ${data.updated || ''}`;

  const rows = data.teams.map(t => {
    const isTop3 = t.rank <= 3;
    let badge = '';
    if (!t.prevRank) {
      badge = '<span class="move move-new">NR</span>';
    } else {
      const diff = t.prevRank - t.rank;
      if (diff > 0) badge = `<span class="move move-up">▲${diff}</span>`;
      else if (diff < 0) badge = `<span class="move move-down">▼${Math.abs(diff)}</span>`;
    }
    return `<div class="row">
      <div class="rank ${isTop3 ? 'top3' : ''}">${t.rank}</div>
      <div class="team-info">
        <div class="team-name">${t.name}${badge}</div>
        <div class="team-conf">${t.conf || ''}</div>
      </div>
      <div class="record">${t.record || ''}</div>
      <div class="pts">${t.points ? t.points.toLocaleString() : '—'}</div>
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="col-header">
      <span>RK</span><span>TEAM</span><span class="right">REC</span><span class="right">PTS</span>
    </div>
    ${rows}
    <div class="footer">Refreshes daily · Source: AP Poll · Last loaded ${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}</div>
  `;

  // Tell the parent frame to resize to fit all content
  const totalHeight = document.body.scrollHeight;
  window.parent.postMessage({ type: 'setHeight', height: totalHeight }, '*');
}

function showError(msg) {
  document.getElementById('content').innerHTML =
    `<div class="error">⚠ ${msg}<br><br><small>Check your connection or try refreshing.</small></div>`;
}

async function loadRankings(forceRefresh = false) {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true; btn.textContent = '↻ Loading…';

  if (!forceRefresh) {
    const cached = loadCache();
    if (cached) { render(cached); btn.disabled = false; btn.textContent = '↻ Refresh'; return; }
  }

  document.getElementById('content').innerHTML =
    '<div class="loading"><div class="spinner"></div>Fetching latest rankings…</div>';

  try {
    const data = await fetchFromClaude();
    saveCache(data);
    render(data);
  } catch(e) {
    console.error(e);
    const cached = loadCache();
    if (cached) render(cached);
    else showError('Could not load rankings. ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = '↻ Refresh';
  }
}

loadRankings();
</script>
</body>
</html>
