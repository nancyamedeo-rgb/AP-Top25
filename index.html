<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AP Top 25 – College Football</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: transparent !important;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .widget { width: 100%; max-width: 480px; }

    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-radius: 14px 14px 0 0;
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      border-bottom: none;
    }

    .football-icon { width: 48px; height: 48px; flex-shrink: 0; }

    .header-text h1 { font-size: 24px; font-weight: 700; color: #fff; letter-spacing: 0.01em; }
    .header-text p  { font-size: 16px; color: rgba(255,255,255,0.45); margin-top: 2px; }

    .refresh-btn {
      margin-left: auto;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.55);
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .refresh-btn:disabled { opacity: 0.4; cursor: default; }

    .body {
      background: transparent;
      border: none;
      border-radius: 0 0 14px 14px;
      overflow: hidden;
    }

    .col-header {
      display: grid;
      grid-template-columns: 36px 1fr 60px 60px;
      padding: 0.5rem 1.25rem;
      background: transparent;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .col-header span {
      font-size: 10px; font-weight: 600;
      color: rgba(255,255,255,0.28);
      text-transform: uppercase; letter-spacing: 0.07em;
    }
    .col-header .right { text-align: right; }

    .row {
      display: grid;
      grid-template-columns: 36px 1fr 60px 60px;
      align-items: center;
      padding: 0.6rem 1.25rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.1s;
    }
    .row:last-child { border-bottom: none; }
    .row:hover { background: rgba(255,255,255,0.03); }

    .rank { font-size: 20px; font-weight: 700; color: rgba(255,255,255,0.35); width: 28px; }
    .rank.top3 { color: #f5a623; }

    .team-info { display: flex; flex-direction: column; gap: 1px; }
    .team-name { font-size: 20px; font-weight: 600; color: #fff; }
    .team-conf { font-size: 18px; color: rgba(255,255,255,0.28); }

    .record { font-size: 20px; color: rgba(255,255,255,0.45); text-align: right; }
    .pts    { font-size: 20px; font-weight: 600; color: rgba(255,255,255,0.6); text-align: right; }

    .move {
      display: inline-flex; align-items: center;
      font-size: 9px; font-weight: 700;
      padding: 1px 4px; border-radius: 3px;
      margin-left: 5px; vertical-align: middle;
    }
    .move-up   { background: rgba(52,199,89,0.18);  color: #34c759; }
    .move-down { background: rgba(255,59,48,0.18);  color: #ff3b30; }
    .move-new  { background: rgba(245,166,35,0.2);  color: #f5a623; }

    .scroll-viewport { height: 420px; overflow: hidden; position: relative; }
    .scroll-viewport::before,
    .scroll-viewport::after {
      content: ''; position: absolute; left: 0; right: 0; height: 40px; z-index: 2; pointer-events: none;
    }
    .scroll-viewport::before { top: 0;    background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent); }
    .scroll-viewport::after  { bottom: 0; background: linear-gradient(to top,   rgba(0,0,0,0.6), transparent); }

    .scroll-track {
      display: flex; flex-direction: column;
      animation: ticker linear infinite;
      animation-play-state: running;
    }
    .scroll-track:hover { animation-play-state: paused; }

    @keyframes ticker {
      0%   { transform: translateY(0); }
      100% { transform: translateY(-50%); }
    }

    .loading, .error {
      padding: 2.5rem 1.5rem; text-align: center;
      color: rgba(255,255,255,0.35); font-size: 13px;
    }
    .error { color: #ff6b6b; }
    .spinner {
      width: 22px; height: 22px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: rgba(255,255,255,0.5);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      padding: 0.6rem 1.25rem;
      border-top: 1px solid rgba(255,255,255,0.05);
      font-size: 10px; color: rgba(255,255,255,0.2); text-align: center;
    }
  </style>
</head>
<body>
<div class="widget">

  <div class="header">
    <svg class="football-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="24" cy="24" rx="18" ry="11" transform="rotate(-35 24 24)" fill="#8B4513"/>
      <ellipse cx="24" cy="24" rx="18" ry="11" transform="rotate(-35 24 24)" fill="url(#fg)" opacity="0.6"/>
      <line x1="24" y1="17" x2="24" y2="31" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="21" y1="20" x2="27" y2="20" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="21" y1="23" x2="27" y2="23" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="21" y1="26" x2="27" y2="26" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
      <path d="M10 20 Q24 15 38 20" stroke="white" stroke-width="0.8" fill="none" opacity="0.5" transform="rotate(-35 24 24)"/>
      <path d="M10 28 Q24 33 38 28" stroke="white" stroke-width="0.8" fill="none" opacity="0.5" transform="rotate(-35 24 24)"/>
      <defs>
        <linearGradient id="fg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#fff" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#000" stop-opacity="0.15"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="header-text">
      <h1>AP Top 25</h1>
      <p id="subtitle">College Football Poll</p>
    </div>
    <button class="refresh-btn" id="refresh-btn" onclick="loadRankings(true)">↻ Refresh</button>
  </div>

  <div class="body">
    <div id="content">
      <div class="loading"><div class="spinner"></div>Loading latest rankings&hellip;</div>
    </div>
  </div>

</div>

<script>
const CACHE_KEY = 'ap_top25_v2';

// ── Final 2025 season rankings as off-season fallback ──────────────────────
const OFFSEASON_FALLBACK = {
  week: 'Final Rankings, 2025 Season',
  updated: 'January 2026',
  offseason: true,
  teams: [
    { rank:  1, prevRank:  1, name: 'Indiana',       conf: 'Big Ten',    record: '16-0',  points: 1550 },
    { rank:  2, prevRank:  2, name: 'Miami',         conf: 'ACC',        record: '13-3',  points: 1490 },
    { rank:  3, prevRank:  3, name: 'Ole Miss',      conf: 'SEC',        record: '13-2',  points: 1420 },
    { rank:  4, prevRank:  4, name: 'Oregon',        conf: 'Big Ten',    record: '13-2',  points: 1360 },
    { rank:  5, prevRank:  5, name: 'Ohio State',    conf: 'Big Ten',    record: '12-2',  points: 1310 },
    { rank:  6, prevRank:  6, name: 'Georgia',       conf: 'SEC',        record: '11-3',  points: 1260 },
    { rank:  7, prevRank:  7, name: 'Texas Tech',    conf: 'Big 12',     record: '12-3',  points: 1190 },
    { rank:  8, prevRank:  8, name: 'Texas A&amp;M', conf: 'SEC',        record: '11-3',  points: 1140 },
    { rank:  9, prevRank:  9, name: 'Alabama',       conf: 'SEC',        record: '10-4',  points: 1080 },
    { rank: 10, prevRank: 10, name: 'Notre Dame',    conf: 'Ind.',       record: '10-3',  points: 1020 },
    { rank: 11, prevRank: 11, name: 'BYU',           conf: 'Big 12',     record: '11-3',  points:  960 },
    { rank: 12, prevRank: 12, name: 'Texas',         conf: 'SEC',        record: '11-3',  points:  900 },
    { rank: 13, prevRank: 13, name: 'Oklahoma',      conf: 'SEC',        record: '10-3',  points:  840 },
    { rank: 14, prevRank: 14, name: 'Utah',          conf: 'Big 12',     record: '10-3',  points:  790 },
    { rank: 15, prevRank: 15, name: 'Vanderbilt',    conf: 'SEC',        record: '9-4',   points:  740 },
    { rank: 16, prevRank: 16, name: 'Virginia',      conf: 'ACC',        record: '10-3',  points:  680 },
    { rank: 17, prevRank: 17, name: 'Iowa',          conf: 'Big Ten',    record: '10-3',  points:  630 },
    { rank: 18, prevRank: 18, name: 'Tulane',        conf: 'AAC',        record: '11-3',  points:  580 },
    { rank: 19, prevRank: 19, name: 'James Madison', conf: 'Sun Belt',   record: '12-2',  points:  530 },
    { rank: 20, prevRank: 20, name: 'USC',           conf: 'Big Ten',    record: '9-4',   points:  480 },
    { rank: 21, prevRank: 21, name: 'Michigan',      conf: 'Big Ten',    record: '9-4',   points:  420 },
    { rank: 22, prevRank: 22, name: 'Houston',       conf: 'Big 12',     record: '10-3',  points:  370 },
    { rank: 23, prevRank: 23, name: 'Navy',          conf: 'AAC',        record: '10-3',  points:  310 },
    { rank: 24, prevRank: 24, name: 'North Texas',   conf: 'AAC',        record: '11-3',  points:  250 },
    { rank: 25, prevRank: 25, name: 'TCU',           conf: 'Big 12',     record: '9-4',   points:  190 },
  ]
};

// ── Fetch from ESPN public API ─────────────────────────────────────────────
async function fetchFromESPN() {
  const res = await fetch('https://site.api.espn.com/apis/site/v2/sports/football/college-football/rankings');
  if (!res.ok) throw new Error('ESPN returned ' + res.status);
  const data = await res.json();

  const poll = data.rankings && data.rankings.find(r =>
    r.name && r.name.toLowerCase().includes('associated press')
  );
  if (!poll || !poll.ranks || poll.ranks.length === 0) return null; // off-season

  const teams = poll.ranks.map(e => ({
    rank:     e.current,
    prevRank: e.previous || e.current,
    name:     e.team.name,
    conf:     e.team.location || '',
    record:   e.recordSummary || '',
    points:   e.points || null,
  }));

  const week    = poll.headline || ('Week ' + (poll.occurrenceIndex || ''));
  const updated = poll.lastUpdated
    ? new Date(poll.lastUpdated).toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'})
    : new Date().toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'});

  return { week, updated, teams };
}

// ── Cache ──────────────────────────────────────────────────────────────────
function saveCache(data) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data })); } catch(e) {}
}
function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const { ts, data } = JSON.parse(raw);
    // Live data: cache 24h. Fallback: cache 1h so it retries when season starts.
    const ttl = data.offseason ? 60 * 60 * 1000 : 24 * 60 * 60 * 1000;
    if (Date.now() - ts < ttl) return data;
  } catch(e) {}
  return null;
}

// ── Render ─────────────────────────────────────────────────────────────────
function render(data) {
  document.getElementById('subtitle').textContent =
    (data.week || 'Latest Poll') + ' \u00b7 ' + (data.updated || '');

  const makeRows = teams => teams.map(t => {
    const isTop3 = t.rank <= 3;
    let badge = '';
    if (!t.prevRank || t.prevRank === 0) {
      badge = '<span class="move move-new">NR</span>';
    } else {
      const d = t.prevRank - t.rank;
      if (d > 0) badge = '<span class="move move-up">&#9650;' + d + '</span>';
      else if (d < 0) badge = '<span class="move move-down">&#9660;' + Math.abs(d) + '</span>';
    }
    return '<div class="row">' +
      '<div class="rank' + (isTop3 ? ' top3' : '') + '">' + t.rank + '</div>' +
      '<div class="team-info">' +
        '<div class="team-name">' + t.name + badge + '</div>' +
        '<div class="team-conf">' + (t.conf || '') + '</div>' +
      '</div>' +
      '<div class="record">' + (t.record || '') + '</div>' +
      '<div class="pts">' + (t.points ? t.points.toLocaleString() : '&mdash;') + '</div>' +
    '</div>';
  }).join('');

  const duration = 42 * data.teams.length * 0.12;
  const footerNote = data.offseason
    ? 'Final 2025 season rankings &middot; Live poll returns in August'
    : 'Hover to pause &middot; Source: ESPN / AP Poll &middot; ' +
      new Date().toLocaleDateString('en-US', {month:'short', day:'numeric', hour:'numeric', minute:'2-digit'});

  document.getElementById('content').innerHTML =
    '<div class="col-header">' +
      '<span>RK</span><span>TEAM</span>' +
      '<span class="right">REC</span><span class="right">PTS</span>' +
    '</div>' +
    '<div class="scroll-viewport">' +
      '<div class="scroll-track" style="animation-duration:' + duration + 's">' +
        makeRows(data.teams) + makeRows(data.teams) +
      '</div>' +
    '</div>' +
    '<div class="footer">' + footerNote + '</div>';
}

function showError(msg) {
  document.getElementById('content').innerHTML =
    '<div class="error">&#9888; ' + msg + '<br><br><small>Check your connection or try refreshing.</small></div>';
}

// ── Main ───────────────────────────────────────────────────────────────────
async function loadRankings(forceRefresh) {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true; btn.textContent = '&#8635; Loading\u2026';

  if (!forceRefresh) {
    const cached = loadCache();
    if (cached) { render(cached); btn.disabled = false; btn.textContent = '&#8635; Refresh'; return; }
  }

  document.getElementById('content').innerHTML =
    '<div class="loading"><div class="spinner"></div>Fetching latest rankings&hellip;</div>';

  try {
    const live = await fetchFromESPN();
    const data = live || OFFSEASON_FALLBACK;
    saveCache(data);
    render(data);
  } catch(e) {
    console.error(e);
    const cached = loadCache();
    if (cached) { render(cached); }
    else { render(OFFSEASON_FALLBACK); } // last resort — always show something
  } finally {
    btn.disabled = false; btn.textContent = '&#8635; Refresh';
  }
}

loadRankings();
</script>
</body>
</html>
